appId: io.github.hakuneko-reborn
productName: HakuNeko Reborn
copyright: The HakuNeko Reborn contributors — built on HakuNeko by the HakuNeko Development Team

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - '!**/*.map'

extraResources:
  - from: resources/catalog.json
    to: catalog.json
  - from: resources/schemas
    to: schemas

# Auto-update source. electron-builder generates the latest*.yml update
# manifests next to the installers; electron-updater reads them from here, so
# this must stay pointed at the repo that hosts HakuNeko Reborn releases (never
# at upstream manga-download/hakuneko — that's a different project).
publish:
  provider: github
  owner: CoNoYaR0
  repo: hakuneko-reborn
  # Publish as a GitHub pre-release (not "Latest"), which is what an alpha is.
  # It also keeps auto-update honest: electron-updater only offers pre-releases
  # to users already running a pre-release build (allowPrerelease defaults to true
  # when the installed version has a prerelease component, e.g. 1.0.0-alpha.0), so
  # alpha testers get alpha updates and nobody else is dragged onto them.
  # Change to `release` for the first stable.
  releaseType: prerelease
  # electron-builder's default publish timeout is 2 minutes, which is not enough
  # to upload a ~130 MB installer from a slower runner — the v1.0.0-alpha.0 Windows
  # job packaged the NSIS .exe fine and then died with "Request timed out" mid-upload,
  # leaving an orphan .blockmap and no installer. 15 minutes is generous enough that
  # a slow upload can't fail the release.
  timeout: 900000

linux:
  icon: build/icon.png
  category: Utility
  synopsis: Manga downloader
  description: A modern, fast manga downloader with one-click sources. A rebuild of HakuNeko.
  maintainer: The HakuNeko Reborn contributors
  executableName: hakuneko-reborn
  desktop:
    entry:
      Name: HakuNeko Reborn
      Comment: Manga downloader with one-click sources
      Categories: Utility;Network;
      # Match app.setName('hakuneko-reborn') so DEs group running windows with the icon.
      StartupWMClass: hakuneko-reborn
  target:
    - AppImage
    - deb
    - rpm

win:
  icon: build/icon.ico
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # MUST differ from the portable target's name. Both produce a .exe, so with only
  # the global artifactName below they resolved to the identical filename —
  # clobbering each other on disk, then racing to upload the same release asset
  # (GitHub answers the second one with 400 Bad Request). Linux never hit this
  # because AppImage/deb/rpm have distinct extensions.
  artifactName: ${name}-${version}-${os}-${arch}-setup.${ext}

portable:
  artifactName: ${name}-${version}-${os}-${arch}-portable.${ext}

mac:
  icon: build/icon.png
  category: public.app-category.utilities
  target:
    - dmg

# Use ${name} (package name, "hakuneko-reborn") not ${productName} — the latter
# contains a space, which makes for awkward download filenames and CLI paths.
artifactName: ${name}-${version}-${os}-${arch}.${ext}
